{% load static %}
<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="utf-8" />  
  <meta name="viewport" content="width=device-width,initial-scale=1" />  
     <link rel="icon" type="image/png" href="{% static 'icons/icon-192.png' %}">
  <title>HeartNote — Write What You Couldn't Say.</title>  
  
  <!-- Quicksand (Google Fonts) -->  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">  
 <link
        href="https://fonts.googleapis.com/family=Kalam:wght@400;600&display=swap"
        rel="stylesheet">
  <link rel="manifest" href="{% static 'pwa/manifest.json' %}">
<meta name="theme-color" content="#ffffff" id="themeColorMeta">
  <style>  
  :root{  
      --bg: #fff;  
      --text:#000;
      --accent:  #ff4d6d;  
      --muted: #e63950;  
--card: rgba(255,255,255,0.04);  
--glass: rgba(255,255,255,0.03);  
    } 

body.dark {
  --bg: #0e0e0f;
  --text: #f9f9fb;
  --accent: #ff5c8d;
  --muted: #ff7da3;
  --option:#000;
  --card: rgba(255, 255, 255, 0.04);
  --glass: rgba(255, 255, 255, 0.05);
}
    *{box-sizing:border-box}  
    html,body{height:100%}  
    body{  
      margin:0;  
      font-family: 'Poppins', sans-serif;  
      background:var(--bg);  
      color: var(--text);  
      -webkit-font-smoothing:antialiased;  
      -moz-osx-font-smoothing:grayscale;  
      display:flex;  
      align-items:flex-start;  
      justify-content:center;  
      padding:28px;  
      gap:20px;  
    }  
    body { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }  
  
    /* Layout container */  
    .app {  
      width:100%;  
      max-width:100%;  
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));  
      border-radius:14px;  
      padding-left: 0px;  
      padding-top: 5px;  
      padding-right: 0px;  
      overflow:hidden;  
    }  
    .app { opacity:0; animation: fadeInApp 0.8s ease forwards; }  
@keyframes fadeInApp { to { opacity:1; } }  
  



textarea:focus {
  outline: none;
  border-bottom: 1px solid var(--accent);
  box-shadow: 0 0 0px rgba(255, 107, 138, 0.2);
}

textarea::placeholder {
  color:grey;
  font-style: italic;
}
    /* Header */  
    .header {  
      display:flex;  
      align-items:center;  
      justify-content:space-between;  
      gap:12px;  
    }  
    .brand {  
      display:flex;  
      align-items:center;  
      gap:12px;  
      font-weight:700;  
      font-size:1.25rem;  
    }  
    .brand .heart img{
      width:48px;
      background: rgba(255,255,255,0.06); 
      height:100%;
    }
    .header .actions {  
      display:flex;  
      gap:10px;  
    }  
    .btn {  
      background:var(--accent);  
      border:none;  
      color:#fff;  
      padding:8px 12px;  
      border-radius:10px;  
      cursor:pointer;  
      font-weight:600;  
      font-size:0.95rem;  
      transition:transform .12s ease, box-shadow .12s ease;  
    }  
    .btn:hover{ background: #F06292; transform: scale(1.05);box-shadow:0 8px 18px rgba(186,23,74,0.18) }  
  
    /* Main grid */  
    .grid {  
      display:grid;  
      gap:18px;  
      margin-top:18px;  
    }  
  
    /* Left column: controls + output */  
    .panel {  
      background:var(--card);  
     backdrop-filter: blur(10px);  
     border: 1px solid rgba(255, 77, 109, 0.2);  
       padding: 28px 26px;
      border-radius:12px;  
      backface-visibility:hidden;  
    }  
  
    label { display:block; margin-bottom:6px; color:var(--accent); font-weight:600; font-size:0.9rem; }  
  
    .controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }  
    select, textarea, input[type="range"] {  
      width:100%;  
      border-radius:10px;  
      box-shadow: 1px 1px 1px 1px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      border: none;  
      background:transparent;  
      color: var(--text);  
      padding:10px;  
      font-size:0.95rem;  
      outline:none;  
    } 
    option{
      color:var(--option);
    }
    textarea{ min-height:90px;resize: none;}  
  
    .small { width:auto; display:inline-flex; gap:8px; align-items:center; }  
  
    .row { display:flex; gap:10px; margin-top:10px; align-items:center; }  
    .row .btn { padding:10px 14px; margin-bottom:20px;}  
  
    /* Handwriting animation */  
@keyframes handwriting {  
  from { stroke-dashoffset: 100%; opacity: 0.6; }  
  to { stroke-dashoffset: 0; opacity: 1; }  
}  
  
.handwriting {  
  font-family: "Caveat", cursive; /* or 'Indie Flower' */  
  font-size: 1.15rem;  
  animation: handwriting 3s ease forwards;  
  white-space: pre-wrap;  
  line-height: 1.8;  
}  
.output pre,  
.output p,  
.output h2 {  
  font-family: "Caveat", cursive !important;  
  font-size: 1.15rem;  
  line-height: 1.8;  
  white-space: pre-wrap;  
}  
  
.output pre,  
.output p {  
  color: var(--text);  
  text-shadow: 0 0 0.6px var(--text);  
}  
  
    /* output */  
    .output {  
      margin-top:14px;  
      background: var(--glass);  
      box-shadow: 1px 1px 1px 1px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      border:none;  
      padding:14px;  
      border-radius:10px;  
      min-height:140px;  
      text-align:left;  
      color:var(--text);  
      line-height:1.5;  
      font-size:1rem;  
      white-space:pre-wrap;  
      word-break: normal;
      overflow-wrap: break-word;
    }  
  
    .output h2 { margin:0 0 8px 0; font-size:1.05rem; color:var(--text); }  
    .output .meta { font-size:0.85rem; color: var(--text); margin-bottom:8px; }  
  
    .toolbar { display:flex; gap:8px; margin-top:10px; }  
  
    .ghost { background:transparent; border:1px solid #ff4d6d; padding:8px 10px; border-radius:8px; color:#ff4d6d; cursor:pointer; }  
  
    /* History (right column) */  
    .history {  
      background:var(--card);  
      backdrop-filter: blur(10px);  
      border: 1px solid rgba(255, 77, 109, 0.2);  
      padding:12px;  
      border-radius:12px;  
      max-height:560px;  
      overflow:auto;  
    } 

    .thinking {
  opacity: 0.7;
}
  
    .muted { color:var(--text); opacity:0.9; font-size:0.9rem; }  
  
    /* footer small */  
    .footnote {  
      margin-top:12px;  
      font-size:0.82rem;  
      color:var(--text);  
      opacity:0.9;  
    }
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: flex;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
  z-index: 9999;
}

.dob-box {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  text-align: center;
  width: 280px;
}
  
    /* responsive */  
    @media (max-width:768px){  
       body{  
        padding-left: 10px;  
        padding-right: 10px;  
        padding-top: 18px;  
      }  
    }  
  
  </style>  
</head>  
<body>  
  <div class="app" role="application" aria-label="HeartNote AI">    
  <div class="header">    
    <div class="brand" aria-hidden="true">    
      <div class="heart"><img src="{% static 'icons/icon-512.png' %}"></div>    
      <div>    
        <div style="font-size:1.05rem;margin-top: -0.8rem;">HeartNote</div>      
        <div style="font-size:0.78rem; color:var(--accent);">
         Write from what actually happened
        </div>
      </div>    
    </div>    

    <div class="actions">    
      <button class="btn" onclick="goHome()">←</button>
      <button class="btn" id="themeToggle" title="Toggle Dark/Light">🌙</button>  
    </div>    
  </div>    

  <div class="grid">    

    <!-- Left panel -->    
    <div class="panel" aria-live="polite">    

      <label for="mode">Choose what you're writing</label>    
      <div class="controls">    
        <select id="mode" aria-label="Choose mode">
          <option value="reflection">Reflection</option>  
          <option value="journal">Journal</option>  
          <option value="letter">Letter</option> 
        </select>  
      </div>    

      <label for="prompt" style="margin-top:12px">Pick what fits this moment</label>    
      <textarea id="prompt"placeholder="Start with what stays in your mind…"></textarea>        

      <div class="row" style="margin-top:12px; align-items:center;">    
        <div style="flex:1">    
          <label for="emotion">How deeply do you want to explore this?</label>   
          <input id="emotion" type="range" min="0" max="100" value="50" />    
          <div class="muted" id="emotionLabel">Balanced</div>    
        </div>    

        <div style="width:130px">    
          <label>&nbsp;</label>    
          <button class="btn" id="generateBtn" style="width:100%">Turn this into writing</button>    
        </div>    
      </div>    

      <div class="output" id="output" tabindex="0" aria-label="Generated output" style="font-size:1.15rem;">    
        <div class="meta muted">This is where your moment begins to feel clearer.
Write something real — even a small moment is enough  </div>    
      </div>    

      <div class="toolbar" style="margin-top:8px">     
        <button class="ghost" id="copyBtn">Copy</button>    
        <button class="ghost" id="clearBtn">Clear</button>    
        <div style="flex:1"></div>    
        <div class="muted" id="lenInfo">0 chars</div>    
      </div>    
      <div class="footnote">
       Start small. Real moments create real meaning.
      </div>    
    </div>    
  <script>  
    // Simple HeartNote AI h1 — client-side  
    (function () {  
      const modeEl = document.getElementById("mode");  
      const promptEl = document.getElementById("prompt");  
      const emotionEl = document.getElementById("emotion");  
      const emotionLabel = document.getElementById("emotionLabel");  
      const generateBtn = document.getElementById("generateBtn");  
      const outputEl = document.getElementById("output");  
      const copy = document.getElementById("copy-btn");
      const lenInfo = document.getElementById("lenInfo"); 
 
  
      // local storage key  
      const STORAGE_KEY = "heartnote_h1_history";  
  
      // helpers  
      function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }  
      function nowTs(){ return new Date().toISOString(); }  
  
      // emotion label update  
      function updateEmotionLabel() {  
        const v = parseInt(emotionEl.value,10);  
        if (v < 25) emotionLabel.textContent = "Light";
else if (v < 60) emotionLabel.textContent = "Honest";
else emotionLabel.textContent = "Deep";

      }  
      emotionEl.addEventListener("input", updateEmotionLabel);  
      updateEmotionLabel();  
  
      // typing effect for output (keeps HTML safe)  
     // Writing effect — smoother, ink-like feel ✍️  
function emotionalHandwriteHTML(html, elementId, toneLevel = "medium") {
    const el = document.getElementById(elementId);
    el.innerHTML = "";
    el.classList.add("handwriting");

    let baseSpeed;
    switch (toneLevel.toLowerCase()) {
        case "deep": baseSpeed = 90; break;
        case "light": baseSpeed = 40; break;
        default: baseSpeed = 60;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const fullText = doc.body.innerText;

    let index = 0;

    function getHumanDelay(char) {
        let delay = baseSpeed;

        // ✨ randomness (human inconsistency)
        delay += Math.random() * 40 - 20;

        // ⏸ punctuation pauses
        if ([".", "!", "?"].includes(char)) delay += 200;
        else if (char === ",") delay += 120;

        // 🤔 thinking pauses (random)
        if (Math.random() < 0.05) delay += 150;

        return delay;
    }

    function typeNext() {
        if (index >= fullText.length) return;

        const char = fullText[index];
        el.textContent += char;
        index++;

        setTimeout(typeNext, getHumanDelay(char));
    }

    typeNext();
}

function getToneFromEmotion(value) {
  const num = Number(value);

  if (num <= 33) return "soft";
  if (num <= 66) return "balanced";
  return "deep";
}
function getLoadingText(tone) {
  switch (tone) {
    case "deep":
      return "Sitting with your thoughts… turning them into words.";
    case "light":
      return "Shaping your words…";
    default:
      return "Turning your moment into something meaningful…";
  }
}

generateBtn.addEventListener("click", async () => {
  const mode = modeEl.value;
  const text = promptEl.value.trim();
  const emotion = emotionEl.value;
  const outputBox = document.getElementById("output");

  if (!text) {
    alert("Please enter something...");
    return;
  }

  // Convert emotion slider → tone keyword
  const tone = getToneFromEmotion(emotion);

outputBox.innerHTML = `<span class="thinking">${getLoadingText(tone)}</span>`;


  try {
    // Correct final URL
    const url = `/api/generate/?mode=${encodeURIComponent(mode)}&text=${encodeURIComponent(text)}&tone=${encodeURIComponent(tone)}`;

    const response = await fetch(url);
    const data = await response.json();

    // Handwriting animation
    emotionalHandwriteHTML(data.response, "output", tone);


  } catch (error) {
    outputBox.innerHTML = "⚠️ Error contacting backend.";
  }
  
});

document.addEventListener('DOMContentLoaded', function() {
    // 1. Get references to key elements
    const clearButton = document.getElementById('clearBtn');
    const outputContainer = document.getElementById('output'); // ⚠️ Confirm this ID!
    const descInput = document.getElementById('prompt'); // Assuming your main input field ID is 'descInput'
    const lenInfo = document.getElementById('lenInfo');
    
    // --- Helper function to update the character count ---
    function updateCharCount() {
        if (descInput && lenInfo) {
            // Get the current length of the text in the input field
            const count = descInput.value.length;
            lenInfo.textContent = `${count} chars`;
        }
    }

    // --- 1. Attach event listener for real-time typing ---
    if (descInput) {
        // Update count whenever the user types, pastes, or cuts text
        descInput.addEventListener('input', updateCharCount);
        
        // Initial call to set the correct count when the page loads
        updateCharCount();
    }
    
    // --- 2. Clear Button Logic ---
    if (clearButton) {
        clearButton.addEventListener('click', function() {
            // 2a. Clear the output content
            if (outputContainer) {
                outputContainer.innerHTML = '';
            }
            
            // 2b. Clear the input field content
            if (descInput) {
                descInput.value = '';
            }
            
            // 2c. Update the character count display to 0
            if (lenInfo) {
                lenInfo.textContent = '0 chars';
            }
            
            // Put focus back on the input field for immediate typing
            if (descInput) {
                descInput.focus();
            }
        });
    }

    // Optional: Log an error if elements aren't found for debugging
    if (!clearButton || !outputContainer || !descInput || !lenInfo) {
        console.error("Missing one or more required elements (clearBtn, outputContainer, descInput, or lenInfo).");
    }
});
      // Add to history (stores HTML + meta)  
     copyBtn.addEventListener("click", () => {  
    const text = outputEl.innerText.trim();  

    if (!text) { 
        alert("Nothing to copy."); 
        return; 
    }  

    navigator.clipboard.writeText(text)
        .then(() => {
            copyBtn.textContent = "Copied ✓";
            setTimeout(() => {
                copyBtn.textContent = "Copy";
            }, 1200);
        })
        .catch(() => {
            alert("Copy failed. Try manually.");
        });
}); 

  
      // small accessibility: allow Enter on prompt to generate when focused + ctrl  
      promptEl.addEventListener("keydown", (e) => {  
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {  
          e.preventDefault();  
          generateBtn.click();  
        }  
      });  
  
    })();
    // Theme toggle
  const THEME_COLORS = {
  light: "#ffffff",
  dark: "#0e0e0f"
};
function updateThemeColor(theme) {
  const meta = document.getElementById("themeColorMeta");
  if (!meta) return;

  meta.setAttribute("content", THEME_COLORS[theme] || "#ffffff");
}
const themeToggle = document.getElementById("themeToggle");
const userTheme = localStorage.getItem("valantine_theme");

if (userTheme === "dark") document.body.classList.add("dark");

function updateThemeIcon() {
  themeToggle.textContent = document.body.classList.contains("dark") ? "☀️" : "🌙";
}
updateThemeColor(userTheme);
updateThemeIcon();

themeToggle.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  const isDark = document.body.classList.contains("dark");
  const theme = isDark ? "dark" : "light";

  localStorage.setItem("valantine_theme", theme);
  updateThemeIcon();
  updateThemeColor(theme);
});
function goHome() {
  window.location.href = "/";
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register("/static/pwa/service-worker.js");
}
  </script>  
</body>  
</html>
